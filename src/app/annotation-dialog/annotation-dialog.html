<h2 mat-dialog-title>{{ data.mode === 'edit' ? 'Edit annotation' : 'New annotation' }}</h2>
<mat-dialog-content>
  @if (data.lat !== undefined && data.lng !== undefined) {
    <p class="coords">{{ data.lat.toFixed(4) }}, {{ data.lng.toFixed(4) }}</p>
  }
  <mat-form-field class="wide">
    <mat-label>Title</mat-label>
    <input matInput name="ann-title" [(ngModel)]="title" cdkFocusInitial />
  </mat-form-field>
  <mat-form-field class="wide">
    <mat-label>Note</mat-label>
    <textarea matInput name="ann-body" rows="5" [(ngModel)]="body"></textarea>
  </mat-form-field>

  <div class="palette">
    <p class="palette__label">Color</p>
    <div class="palette__swatches">
      @for (c of palette; track c.value) {
        <button type="button"
                class="swatch"
                [class.is-selected]="color === c.value"
                [style.background]="c.value"
                [attr.aria-label]="c.name"
                [title]="c.name"
                (click)="selectColor(c.value)"></button>
      }
    </div>
  </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
  @if (data.mode === 'edit') {
    <button mat-button color="warn" (click)="remove()">Delete</button>
  }
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-flat-button color="primary" (click)="save()">Save</button>
</mat-dialog-actions>
