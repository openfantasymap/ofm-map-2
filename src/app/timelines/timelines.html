<mat-toolbar>
    <button #stgl mat-icon-button aria-label="About" (click)="lbar.toggle()"><mat-icon>info</mat-icon></button>
    <h1>OpenFantasyMap</h1>
    <span class="spacer"></span>

    <button mat-icon-button aria-label="Account (coming soon)" (click)="disabled()" class="hidesmall"><mat-icon>person</mat-icon></button>

</mat-toolbar>

<mat-sidenav-container>
    <mat-sidenav class="sidebar" mode="over" #lbar>
        <div class="info">
            OpenFantasyMap and FantasyMaps are projects developed by OpenHistoryMap as an unconventional use case for Digital Humanities and Public History.
        </div>
        <mat-nav-list>
            <a mat-list-item href="https://www.fantasymaps.org">More info</a>
        </mat-nav-list>
    </mat-sidenav>
    <mat-sidenav-content>
        <div class="col">
        <mat-chip-listbox [multiple]="true" [selectable]="true" >
            <mat-chip [highlighted]="t.selected" *ngFor="let t of tags" (click)="filter($event,t.label)">{{t.label}}</mat-chip>   
        </mat-chip-listbox>
    
        <div id="ohm_timelines" class="world-grid">
            <a *ngFor="let tl of seen_timelines"
               class="world-tile"
               [style.background]="tl.bg"
               [style.color]="tl.color"
               [style.background-image]="tl.bgimg"
               [style.grid-column]="'span ' + (tl.size || 1)"
               [style.grid-row]="'span ' + (tl.size || 1)"
               [routerLink]="[tl.url, tl.date, tl.base.zoom, tl.base.lat, tl.base.lng]">
                <span class="world-tile__name">{{tl.name}}</span>
            </a>
        </div>
        </div>
    </mat-sidenav-content>
</mat-sidenav-container>
<div></div>
